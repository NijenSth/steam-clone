version: "3.9"

services:
  caddy:
    image: caddy:2.9
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - api
    networks:
      - web

  frontend:
    build:
      context: ./frontend
    networks:
      - web

  api:
    build:
      context: ./api
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/steamclone
      - SPRING_DATASOURCE_USERNAME=steamclone
      - SPRING_DATASOURCE_PASSWORD=steamclone
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - JWT_SECRET=dev-secret-change-me
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - web
      - data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=steamclone
      - POSTGRES_USER=steamclone
      - POSTGRES_PASSWORD=steamclone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - data

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - data

networks:
  web:
  data:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:

