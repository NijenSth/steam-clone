server:
  port: 8080

spring:
  application:
    name: steam-clone-api

  datasource:
    url: jdbc:postgresql://postgres:5432/steamclone
    username: steamclone
    password: steamclone
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

security:
  jwt:
    issuer: steam-clone
    secret: ${JWT_SECRET:dev-secret-change-me}
    expires-in-seconds: 3600

minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: steam-games

management:
  endpoints:
    web:
      exposure:
        include: health,info

cors:
  allowed-origins:
    - http://localhost:5173
    - http://localhost

